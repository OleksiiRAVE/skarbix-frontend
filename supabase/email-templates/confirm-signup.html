<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirm your Skarbix account</title>
  </head>
  <body style="margin:0;background:#0f0f0f;font-family:Inter,Arial,sans-serif;color:#171717;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">
      Your Skarbix verification code is {{ .Token }}.
    </div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0f0f0f;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.35);">
            <tr>
              <td style="padding:36px 36px 10px;text-align:center;">
                <div style="display:inline-block;width:38px;height:38px;line-height:38px;border-radius:13px;background:#8b5cf6;color:#ffffff;font-weight:800;font-size:20px;">S</div>
                <div style="margin-top:12px;color:#8b5cf6;font-size:22px;font-weight:800;">Skarbix</div>
              </td>
            </tr>
            <tr>
              <td style="padding:12px 36px 0;text-align:center;">
                <h1 style="margin:0;color:#171717;font-size:26px;line-height:1.25;font-weight:800;">Confirm your email</h1>
                <p style="margin:10px 0 0;color:#6b7280;font-size:15px;line-height:1.6;">Use this code to finish creating your Skarbix account.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 36px 12px;">
                <div style="background:#f5f3ff;border:1px solid #ddd6fe;border-radius:18px;padding:22px;text-align:center;">
                  <div style="color:#6b7280;font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;">Verification code</div>
                  <div style="margin-top:10px;color:#111827;font-size:36px;line-height:1;font-weight:900;letter-spacing:0.24em;">{{ .Token }}</div>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:12px 36px 34px;text-align:center;">
                <p style="margin:0;color:#6b7280;font-size:13px;line-height:1.6;">If you did not create a Skarbix account, you can safely ignore this email.</p>
              </td>
            </tr>
          </table>
          <p style="margin:18px 0 0;color:#8b8b8b;font-size:12px;">Financial intelligence, automated.</p>
        </td>
      </tr>
    </table>
  </body>
</html>
